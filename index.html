<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý Chăn nuôi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color: #0f172a;
      --surface-color: rgba(30, 41, 59, 0.7);
      --border-color: rgba(255, 255, 255, 0.1);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --primary: #0ea5e9;
      --primary-hover: #0284c7;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-primary);
      line-height: 1.5;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* Background effects */
    body::before {
      content: ''; position: absolute; top: -20%; left: -10%; width: 50%; height: 50%;
      background: radial-gradient(circle, rgba(14, 165, 233, 0.15) 0%, rgba(15, 23, 42, 0) 70%);
      z-index: -1; border-radius: 50%; filter: blur(60px);
    }
    body::after {
      content: ''; position: absolute; bottom: -20%; right: -10%; width: 50%; height: 50%;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, rgba(15, 23, 42, 0) 70%);
      z-index: -1; border-radius: 50%; filter: blur(60px);
    }

    .glass-panel {
      background: var(--surface-color);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      box-shadow: var(--shadow-md);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      padding: 1.5rem;
    }

    .glass-panel:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }

    .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }

    /* Forms & Inputs */
    input, select, textarea {
      width: 100%; background: rgba(15, 23, 42, 0.8);
      border: 1px solid var(--border-color); color: var(--text-primary);
      padding: 0.75rem 1rem; border-radius: 8px; font-family: inherit; font-size: 0.95rem;
      transition: all 0.2s;
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.2); }
    label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-secondary); font-weight: 500; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0.75rem 1.5rem; border-radius: 8px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; border: none; gap: 0.5rem; font-family: inherit;
    }
    .btn-primary { background: linear-gradient(135deg, var(--primary) 0%, #3b82f6 100%); color: white; }
    .btn-primary:hover { background: linear-gradient(135deg, var(--primary-hover) 0%, #2563eb 100%); }
    .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); padding: 0.4rem 0.5rem; }
    .btn-danger:hover { background: rgba(239, 68, 68, 0.2); }

    /* Table */
    .table-container { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border-color); background: var(--surface-color); backdrop-filter: blur(12px); }
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th { background: rgba(15, 23, 42, 0.6); color: var(--text-secondary); font-weight: 500; padding: 1rem; font-size: 0.85rem; text-transform: uppercase; border-bottom: 1px solid var(--border-color); }
    td { padding: 1rem; border-bottom: 1px solid rgba(255, 255, 255, 0.05); color: var(--text-primary); font-size: 0.95rem; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255, 255, 255, 0.02); }

    /* Badges */
    .badge { display: inline-flex; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
    .badge-feed { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); }
    .badge-breed { background: rgba(14, 165, 233, 0.1); color: var(--primary); border: 1px solid rgba(14, 165, 233, 0.2); }
    .badge-other { background: rgba(245, 158, 11, 0.1); color: var(--warning); border: 1px solid rgba(245, 158, 11, 0.2); }

    /* Layouts */
    .app-header { margin-bottom: 2rem; display: flex; border-bottom: 1px solid var(--border-color); padding-bottom: 1.5rem; }
    .app-title { font-size: 1.8rem; background: linear-gradient(to right, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; }
    .grid-cols-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-bottom: 1.5rem; }
    .grid-cols-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; align-items: start;}
    @media (max-width: 768px) { .grid-cols-3, .grid-cols-2 { grid-template-columns: 1fr; } }
    .text-right { text-align: right; } .text-center { text-align: center; } .mb-4 { margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="container">
    <header class="app-header">
      <h1 class="app-title">🌾 Quản lý Chăn nuôi</h1>
    </header>

    <div class="grid-cols-3" id="dashboard">
      <div class="glass-panel" style="display: flex; align-items: center; gap: 1rem;">
        <div style="padding: 1rem; background: rgba(14, 165, 233, 0.1); border-radius: 12px; color: var(--primary); font-size: 1.5rem;">💰</div>
        <div>
          <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 0.25rem;">Tổng chi phí</p>
          <h2 id="total-expense" style="font-size: 1.5rem; margin: 0;">0 ₫</h2>
        </div>
      </div>
      <div class="glass-panel" style="display: flex; align-items: center; gap: 1rem;">
        <div style="padding: 1rem; background: rgba(16, 185, 129, 0.1); border-radius: 12px; color: var(--success); font-size: 1.5rem;">📦</div>
        <div>
          <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 0.25rem;">Số lần nhập Cám</p>
          <h2 id="feed-count" style="font-size: 1.5rem; margin: 0;">0</h2>
        </div>
      </div>
      <div class="glass-panel" style="display: flex; align-items: center; gap: 1rem;">
        <div style="padding: 1rem; background: rgba(245, 158, 11, 0.1); border-radius: 12px; color: var(--warning); font-size: 1.5rem;">🐰</div>
        <div>
          <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 0.25rem;">Số lần nhập Giống</p>
          <h2 id="breed-count" style="font-size: 1.5rem; margin: 0;">0</h2>
        </div>
      </div>
    </div>

    <div class="grid-cols-2">
      <div>
        <h2 class="mb-4" style="color: var(--text-secondary);">Thêm khoản chi mới</h2>
        <form class="glass-panel" id="entry-form">
          <div style="margin-bottom: 1rem;">
            <label for="date">Ngày nhập</label>
            <input type="date" id="date" required>
          </div>
          <div style="margin-bottom: 1rem;">
            <label for="category">Loại chi phí</label>
            <select id="category">
              <option value="feed">Nhập Cám</option>
              <option value="breed">Nhập Giống</option>
              <option value="other">Chi phí khác</option>
            </select>
          </div>
          <div style="margin-bottom: 1rem;">
            <label for="amount">Số tiền (VNĐ)</label>
            <input type="number" id="amount" placeholder="Nhập số tiền..." min="0" required>
          </div>
          <div style="margin-bottom: 1.5rem;">
            <label for="notes">Ghi chú chi tiết</label>
            <textarea id="notes" placeholder="Ví dụ: 10 bao cám con cò..." rows="3"></textarea>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%;">+ Thêm giao dịch</button>
        </form>
      </div>

      <div>
        <h2 class="mb-4" style="color: var(--text-secondary);">Lịch sử giao dịch</h2>
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Ngày</th>
                <th>Loại</th>
                <th>Ghi chú</th>
                <th class="text-right">Số tiền</th>
                <th class="text-center">Xóa</th>
              </tr>
            </thead>
            <tbody id="history-body">
              <!-- Dữ liệu sẽ được render vào đây bằng Javascript -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 1. Lấy ngày hiện tại theo Múi giờ địa phương
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const dd = String(today.getDate()).padStart(2, '0');
    document.getElementById('date').value = `${yyyy}-${mm}-${dd}`;

    // 2. Khởi tạo và đọc dữ liệu an toàn (tránh lỗi làm hỏng JS)
    let entries = [];
    try {
      const storedData = localStorage.getItem('livestock_entries_html');
      if (storedData) {
        entries = JSON.parse(storedData);
        // Đảm bảo dữ liệu lấy ra luôn là một mảng
        if (!Array.isArray(entries)) {
          entries = [];
        }
      }
    } catch (error) {
      console.warn("Lỗi khi đọc dữ liệu từ LocalStorage, khởi tạo lại mảng trống:", error);
      entries = [];
    }

    const formatCurrency = (amount) => new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(amount);
    
    // Xử lý an toàn chuỗi ngày tháng
    const formatDate = (dateString) => { 
      if (!dateString) return '';
      const parts = dateString.split('-'); 
      if (parts.length === 3) return `${parts[2]}/${parts[1]}/${parts[0]}`;
      return dateString;
    };

    function renderDashboard() {
      let totalExpense = 0, feedCount = 0, breedCount = 0;
      entries.forEach(e => {
        totalExpense += Number(e.amount) || 0;
        if (e.category === 'feed') feedCount++;
        if (e.category === 'breed') breedCount++;
      });
      document.getElementById('total-expense').innerText = formatCurrency(totalExpense);
      document.getElementById('feed-count').innerText = feedCount;
      document.getElementById('breed-count').innerText = breedCount;
    }

    function renderTable() {
      const tbody = document.getElementById('history-body');
      tbody.innerHTML = '';

      if (entries.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" class="text-center" style="color: var(--text-secondary); padding: 2rem;">Chưa có giao dịch nào.</td></tr>`;
        return;
      }

      entries.forEach(entry => {
        const tr = document.createElement('tr');
        
        let badge = '';
        if (entry.category === 'feed') badge = '<span class="badge badge-feed">Cám</span>';
        else if (entry.category === 'breed') badge = '<span class="badge badge-breed">Giống</span>';
        else badge = '<span class="badge badge-other">Khác</span>';

        tr.innerHTML = `
          <td>${formatDate(entry.date)}</td>
          <td>${badge}</td>
          <td>${entry.notes || '-'}</td>
          <td class="text-right" style="font-weight: 500;">${formatCurrency(entry.amount)}</td>
          <td class="text-center">
            <button class="btn btn-danger" onclick="deleteEntry('${entry.id}')" title="Xóa">🗑️</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    function updateApp() {
      // 3. Xử lý lưu an toàn (Báo lỗi nếu trình duyệt chặn)
      try {
        localStorage.setItem('livestock_entries_html', JSON.stringify(entries));
      } catch (error) {
        console.warn("Không thể lưu dữ liệu:", error);
        alert("Cảnh báo: Trình duyệt của bạn đang chặn lưu trữ (LocalStorage). Dữ liệu có thể sẽ bị mất khi bạn tải lại trang web!");
      }
      
      renderDashboard();
      renderTable();
    }

    document.getElementById('entry-form').addEventListener('submit', function(e) {
      // Bắt buộc phải có hàm này để trang web không bị load lại (F5) khi ấn nút Submit
      e.preventDefault(); 
      
      const date = document.getElementById('date').value;
      const category = document.getElementById('category').value;
      const amount = document.getElementById('amount').value;
      const notes = document.getElementById('notes').value;

      entries.unshift({
        id: Date.now().toString(),
        date, 
        category, 
        amount: Number(amount), 
        notes
      });

      document.getElementById('amount').value = '';
      document.getElementById('notes').value = '';
      
      updateApp();
    });

    window.deleteEntry = function(id) {
      entries = entries.filter(e => e.id !== id);
      updateApp();
    }

    // Khởi chạy giao diện lần đầu
    updateApp();
  </script>
</body>
</html>
